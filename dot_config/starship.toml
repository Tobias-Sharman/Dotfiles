add_newline = false
command_timeout = 1000

format = "$directory$git_branch$git_status$git_state$sudo$character"
right_format = "$python$nodejs$rust$golang${custom.c_std}${custom.cxx_std}$cmd_duration$status"

[directory]
format = "[¾░ëï $path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
style = "bold blue"
read_only = " ¾░î¥"
read_only_style = "bold red"

[git_branch]
symbol = "´Éİ "
format = "[$symbol$branch]($style) "
style = "bold purple"
truncation_length = 32
truncation_symbol = "ÔÇĞ"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
conflicted = "´Éí "
stashed = "´Éæ "
deleted = "-${count} "
renamed = "¾░ä¥${count} "
modified = "!${count} "
staged = "+${count} "
untracked = "?${count} "
ahead = "Ôçí${count} "
behind = "Ôçú${count} "
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count} "

[git_state]
format = "[´Çí $state( $progress_current/$progress_total)]($style) "
style = "bold yellow"

[sudo]
disabled = false
symbol = "¾░î¥ "
format = "[$symbol]($style)"
style = "bold red"

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold purple)"

[python]
symbol = "¯£╝ "
format = "[$symbol$version( $virtualenv)]($style) "
version_format = "${major}.${minor}"
style = "bold yellow"

[nodejs]
symbol = "¯£İ "
format = "[$symbol$version]($style) "
version_format = "v${major}"
style = "bold green"

[rust]
symbol = "¯Ş¿ "
format = "[$symbol$version]($style) "
version_format = "${major}.${minor}"
style = "bold red"

[golang]
symbol = "¾░şô "
format = "[$symbol$version]($style) "
version_format = "${major}.${minor}"
style = "bold cyan"

[custom.c_std]
command = '''
d="$PWD"
while [ "$d" != "/" ]; do
	if [ -f "$d/CMakeLists.txt" ]; then
		grep -oE 'c_std_[0-9]+' "$d/CMakeLists.txt" | grep -oE '[0-9]+' | head -1
		break
	fi
	d=$(dirname "$d")
done
'''
when = '''
d="$PWD"
while [ "$d" != "/" ]; do
	[ -f "$d/CMakeLists.txt" ] && exit 0
	d=$(dirname "$d")
done
exit 1
'''
format = "([¯Ø▒ $output]($style) )"
style = "bold blue"

[custom.cxx_std]
command = '''
d="$PWD"
while [ "$d" != "/" ]; do
	if [ -f "$d/CMakeLists.txt" ]; then
		grep -oE 'cxx_std_[0-9]+' "$d/CMakeLists.txt" | grep -oE '[0-9]+' | head -1
		break
	fi
	d=$(dirname "$d")
done
'''
when = '''
d="$PWD"
while [ "$d" != "/" ]; do
	[ -f "$d/CMakeLists.txt" ] && exit 0
	d=$(dirname "$d")
done
exit 1
'''
format = "([¯Şú $output]($style) )"
style = "bold blue"

[cmd_duration]
min_time = 1000
format = "[¾░öş $duration]($style) "
style = "bold yellow"

[status]
disabled = false
symbol = "´æğ "
format = "[$symbol$status]($style) "
style = "bold red"
